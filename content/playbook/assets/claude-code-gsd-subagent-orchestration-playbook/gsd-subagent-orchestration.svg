<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="violetGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">
    Claude Code + GSD 子代理编排实战
  </text>
  <text x="600" y="85" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16">
    Sub-Agent Orchestration · Wave Execution · Verification-Driven Delivery
  </text>
  
  <!-- Main Session Hub (Top Center) -->
  <g filter="url(#softShadow)">
    <rect x="450" y="110" width="300" height="70" rx="12" fill="#1e3a5f" stroke="url(#blueGradient)" stroke-width="2"/>
    <text x="600" y="140" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">主会话 Main Session</text>
    <text x="600" y="162" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">调度 · 决策 · 上下文隔离</text>
  </g>
  
  <!-- Connection lines from main session to sub-agents -->
  <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 520 180 L 200 230" stroke-dasharray="5,5"/>
    <path d="M 600 180 L 600 230"/>
    <path d="M 680 180 L 1000 230" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Sub-Agent 1: Planner (Left) -->
  <g filter="url(#softShadow)">
    <rect x="70" y="230" width="260" height="80" rx="10" fill="#2d1f0f" stroke="url(#amberGradient)" stroke-width="2"/>
    <circle cx="110" cy="270" r="20" fill="#f59e0b" opacity="0.2"/>
    <text x="130" y="262" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">规划代理 Planner</text>
    <text x="130" y="282" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">需求拆解 · Roadmap · Phase 规划</text>
    <text x="130" y="300" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">→ 输出: v1/v2/out-of-scope</text>
  </g>
  
  <!-- Sub-Agent 2: Builder (Center) -->
  <g filter="url(#softShadow)">
    <rect x="470" y="230" width="260" height="80" rx="10" fill="#1f1a2e" stroke="url(#violetGradient)" stroke-width="2"/>
    <circle cx="510" cy="270" r="20" fill="#8b5cf6" opacity="0.2"/>
    <text x="530" y="262" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">研发代理 Builder</text>
    <text x="530" y="282" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">代码生成 · 重构 · 功能实现</text>
    <text x="530" y="300" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">→ 输出: 可验证的代码变更</text>
  </g>
  
  <!-- Sub-Agent 3: Verifier (Right) -->
  <g filter="url(#softShadow)">
    <rect x="870" y="230" width="260" height="80" rx="10" fill="#0f2922" stroke="url(#emeraldGradient)" stroke-width="2"/>
    <circle cx="910" cy="270" r="20" fill="#10b981" opacity="0.2"/>
    <text x="930" y="262" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">验证代理 Verifier</text>
    <text x="930" y="282" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">测试执行 · 构建验证 · 报告生成</text>
    <text x="930" y="300" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">→ 输出: 验证报告 + 可追溯提交</text>
  </g>
  
  <!-- Wave Execution Section -->
  <g>
    <rect x="70" y="340" width="1060" height="120" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="100" y="365" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Wave Execution 波次执行</text>
    
    <!-- Wave 1 -->
    <g>
      <rect x="100" y="380" width="300" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="120" y="400" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Wave 1: 依赖链顺序</text>
      <text x="120" y="420" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Task A → Task B → Task C</text>
      <circle cx="370" cy="410" r="15" fill="#3b82f6" opacity="0.3"/>
      <text x="370" y="414" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="10">1</text>
    </g>
    
    <!-- Wave 2 -->
    <g>
      <rect x="440" y="380" width="300" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="460" y="400" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Wave 2: 并行任务</text>
      <text x="460" y="420" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Task D | Task E | Task F</text>
      <circle cx="710" cy="410" r="15" fill="#8b5cf6" opacity="0.3"/>
      <text x="710" y="414" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="10">2</text>
    </g>
    
    <!-- Wave 3 -->
    <g>
      <rect x="780" y="380" width="300" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="800" y="400" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Wave 3: 验证闭环</text>
      <text x="800" y="420" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">lint → test → build ✓</text>
      <circle cx="1050" cy="410" r="15" fill="#10b981" opacity="0.3"/>
      <text x="1050" y="414" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="10">3</text>
    </g>
    
    <!-- Flow arrows between waves -->
    <g fill="none" stroke="#475569" stroke-width="2">
      <path d="M 400 410 L 440 410" marker-end="url(#arrowhead)"/>
      <path d="M 740 410 L 780 410" marker-end="url(#arrowhead)"/>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  
  <!-- Key Commands Section -->
  <g>
    <rect x="70" y="480" width="500" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="505" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">核心命令</text>
    
    <text x="90" y="530" fill="#60a5fa" font-family="monospace" font-size="11">/gsd:map-codebase</text>
    <text x="250" y="530" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">生成代码库映射</text>
    
    <text x="90" y="550" fill="#a78bfa" font-family="monospace" font-size="11">/gsd:execute-phase 1</text>
    <text x="250" y="550" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">波次执行阶段任务</text>
    
    <text x="380" y="530" fill="#34d399" font-family="monospace" font-size="11">/gsd:verify-work 1</text>
    <text x="530" y="530" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10">验证阶段产出</text>
  </g>
  
  <!-- Benefits Section -->
  <g>
    <rect x="600" y="480" width="530" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="620" y="505" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">交付收益</text>
    
    <g>
      <circle cx="640" cy="530" r="6" fill="#f59e0b"/>
      <text x="655" y="534" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">上下文隔离：每个代理专注一件事</text>
    </g>
    
    <g>
      <circle cx="640" cy="555" r="6" fill="#8b5cf6"/>
      <text x="655" y="559" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">波次并行：独立任务同时推进</text>
    </g>
    
    <g>
      <circle cx="950" cy="530" r="6" fill="#10b981"/>
      <text x="965" y="534" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">验证驱动：证据完成替代感觉完成</text>
    </g>
    
    <g>
      <circle cx="950" cy="555" r="6" fill="#3b82f6"/>
      <text x="965" y="559" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">可追溯提交：每阶段都有记录</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">
    驭智增效，慧见未来 · Drive intelligence, gain leverage
  </text>
</svg>