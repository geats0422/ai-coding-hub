<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Claude Code Superpowers full-stack workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070d1a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#101d34"/>
    </linearGradient>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#22c55e"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.35"/>
  <rect x="32" y="32" width="1136" height="566" rx="22" fill="none" stroke="#22314e"/>

  <text x="70" y="96" fill="#f1f5f9" font-size="35" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Claude Code + Superpowers Full-Stack Workflow</text>
  <text x="70" y="132" fill="#94a3b8" font-size="21" font-family="Segoe UI, Arial, sans-serif">Brainstorm -> Write Plan -> Execute Plan -> Next.js + Supabase delivery</text>

  <rect x="78" y="170" width="260" height="140" rx="14" fill="url(#chip)" stroke="#334155"/>
  <text x="100" y="214" fill="#f8fafc" font-size="22" font-family="Consolas, monospace">Claude Code CLI</text>
  <text x="100" y="246" fill="#cbd5e1" font-size="16" font-family="Segoe UI, Arial, sans-serif">- requirement intake</text>
  <text x="100" y="272" fill="#cbd5e1" font-size="16" font-family="Segoe UI, Arial, sans-serif">- context guardrails</text>

  <rect x="374" y="170" width="248" height="66" rx="10" fill="#0b1220" stroke="#2dd4bf" filter="url(#soft-glow)"/>
  <text x="400" y="211" fill="#f8fafc" font-size="21" font-family="Consolas, monospace">/superpowers brainstorm</text>

  <rect x="374" y="250" width="248" height="66" rx="10" fill="#0b1220" stroke="#38bdf8"/>
  <text x="415" y="291" fill="#f8fafc" font-size="21" font-family="Consolas, monospace">/superpowers write-plan</text>

  <rect x="374" y="330" width="248" height="66" rx="10" fill="#0b1220" stroke="#22c55e"/>
  <text x="406" y="371" fill="#f8fafc" font-size="21" font-family="Consolas, monospace">/superpowers execute-plan</text>

  <rect x="670" y="160" width="450" height="268" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="694" y="202" fill="#f8fafc" font-size="24" font-family="Consolas, monospace">Parallel Build Lanes</text>

  <rect x="694" y="222" width="188" height="88" rx="10" fill="#111827" stroke="#334155"/>
  <text x="716" y="254" fill="#f8fafc" font-size="19" font-family="Segoe UI, Arial, sans-serif">Next.js UI</text>
  <text x="716" y="280" fill="#cbd5e1" font-size="15" font-family="Segoe UI, Arial, sans-serif">routes + components</text>

  <rect x="904" y="222" width="192" height="88" rx="10" fill="#111827" stroke="#334155"/>
  <text x="926" y="254" fill="#f8fafc" font-size="19" font-family="Segoe UI, Arial, sans-serif">Supabase API</text>
  <text x="926" y="280" fill="#cbd5e1" font-size="15" font-family="Segoe UI, Arial, sans-serif">auth + policies</text>

  <rect x="798" y="324" width="188" height="82" rx="10" fill="#111827" stroke="#334155"/>
  <text x="828" y="355" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">Schema + RLS</text>
  <text x="826" y="380" fill="#cbd5e1" font-size="15" font-family="Segoe UI, Arial, sans-serif">migration scripts</text>

  <rect x="320" y="454" width="256" height="102" rx="12" fill="#0b1220" stroke="#f59e0b"/>
  <text x="349" y="492" fill="#f8fafc" font-size="22" font-family="Consolas, monospace">Validation Gate</text>
  <text x="349" y="520" fill="#cbd5e1" font-size="16" font-family="Segoe UI, Arial, sans-serif">npm run build</text>
  <text x="349" y="542" fill="#86efac" font-size="14" font-family="Segoe UI, Arial, sans-serif">changed files + pass/fail + fixes</text>

  <rect x="666" y="454" width="454" height="102" rx="12" fill="#0b1220" stroke="#22c55e"/>
  <text x="690" y="492" fill="#f8fafc" font-size="22" font-family="Consolas, monospace">Shippable Full-Stack Output</text>
  <text x="690" y="520" fill="#cbd5e1" font-size="16" font-family="Segoe UI, Arial, sans-serif">Next.js app + Supabase backend + reproducible workflow</text>
  <text x="690" y="543" fill="#86efac" font-size="14" font-family="Segoe UI, Arial, sans-serif">Spec aligned, verified, ready to deploy</text>

  <path d="M340 240 H364" stroke="url(#trace)" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M622 203 H658" stroke="url(#trace)" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M622 283 H658" stroke="url(#trace)" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M622 363 H658" stroke="url(#trace)" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M898 406 L560 456" stroke="url(#trace)" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M576 505 H654" stroke="url(#trace)" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="70" y="585" fill="#22c55e" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="600">From fuzzy prompt to verified delivery without hand-coding chaos.</text>
</svg>
